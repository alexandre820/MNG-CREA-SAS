<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créa Studio — Mush n Go</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Créa Studio — Station HQ DNA (dark glass + violet/jaune-vert)
   ============================================================ */
:root {
  /* Backgrounds — dark layered */
  --bg: #0A0A0F;
  --bg2: #12121A;
  --bg3: #1A1A2E;
  --bg4: #252540;
  --bg-sidebar: #0A0A0F;
  --bg-main: #0A0A0F;
  --bg-card: rgba(255,255,255,.06);

  /* Glass system */
  --glass: rgba(255,255,255,.06);
  --glass2: rgba(255,255,255,.10);
  --glass3: rgba(255,255,255,.16);
  --glass4: rgba(255,255,255,.22);
  --glass-border: rgba(255,255,255,.08);
  --glass-border2: rgba(255,255,255,.14);
  --glass-border3: rgba(255,255,255,.2);

  /* Accent — MNG violet + jaune-vert (au lieu de cyan Station) */
  --accent: linear-gradient(135deg,#a78bfa,#f9f784);
  --accent-solid: #a78bfa;
  --accent-yellow: #f9f784;
  --accent-soft: rgba(167,139,250,.12);
  --accent-glow: rgba(167,139,250,.25);
  --accent-bg: rgba(167,139,250,.10);
  --accent-secondary: #f9f784;
  --accent-secondary-bg: rgba(249,247,132,.14);
  --accent-light: #c4a8ff;

  /* Text — light on dark */
  --text-primary: #F5F5FA;
  --text: #F5F5FA;
  --text2: rgba(245,245,250,.72);
  --text3: rgba(245,245,250,.45);
  --text-secondary: rgba(245,245,250,.72);
  --text-muted: rgba(245,245,250,.45);
  --text-white: #FFFFFF;
  --text-white-secondary: rgba(245,245,250,.72);

  /* Status colors */
  --red: #f43f5e;
  --green: #10b981;
  --orange: #f59e0b;
  --yellow: #eab308;
  --pink: #ec4899;

  /* Borders */
  --border: rgba(255,255,255,.08);
  --border-dark: rgba(255,255,255,.14);

  /* Radius */
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --radius-lg: 20px;

  /* Shadows */
  --shadow: 0 4px 24px rgba(0,0,0,.3);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.4);

  /* Effects */
  --blur: blur(20px);
  --transition: .25s cubic-bezier(.4,0,.2,1);
  --spring: .4s cubic-bezier(.175,.885,.32,1.275);

  /* Layout */
  --sidebar-width: 240px;
  --font-sans: 'Inter', 'DM Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  --font-serif: 'Instrument Serif', Georgia, serif;

  /* Backgrounds with radial */
  --fun-gradient: linear-gradient(135deg,rgba(167,139,250,.15),rgba(249,247,132,.08));
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
html {
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  color: var(--text);
}
body {
  font-family: var(--font-sans);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(167,139,250,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(249,247,132,.06) 0%, transparent 50%);
  color: var(--text);
  overflow: hidden;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }
::selection { background: var(--accent-solid); color: #fff; }

/* ---- Layout ---- */
.app-layout {
  display: flex;
  height: 100vh;
}

/* ---- Sidebar — Station HQ glass ---- */
.sidebar {
  width: var(--sidebar-width);
  background: rgba(18,18,30,.92);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-right: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  padding: 24px 12px;
  flex-shrink: 0;
  overflow-y: auto;
  z-index: 50;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px 24px;
  border-bottom: 1px solid var(--glass-border);
  margin-bottom: 16px;
  cursor: pointer;
}
.sidebar-logo svg { width: 24px; height: 24px; color: var(--accent-solid); }
.sidebar-logo span {
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: -.03em;
  background: var(--accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-logo em {
  font-style: normal;
  font-weight: 400;
}

.nav-section {
  margin-bottom: 16px;
  padding: 0 4px;
}
.nav-section-title {
  font-size: .65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: var(--text3);
  padding: 8px 12px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text2);
  cursor: pointer;
  font-size: .88rem;
  font-weight: 500;
  transition: all var(--transition);
  border: none;
  border-left: 3px solid transparent;
  background: none;
  width: 100%;
  text-align: left;
  position: relative;
}
.nav-item:hover {
  background: var(--glass2);
  color: var(--text);
  transform: translateX(2px);
}
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent-solid);
  border-left: 3px solid var(--accent-solid);
  font-weight: 600;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-footer { margin-top: auto; padding-top: 16px; padding: 12px; border-top: 1px solid var(--glass-border); }
.sidebar-upgrade {
  background: var(--glass2);
  color: var(--text2);
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-weight: 500;
  font-size: .82rem;
  cursor: pointer;
  border: 1px solid var(--glass-border);
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all var(--transition);
}
.sidebar-upgrade:hover { background: var(--glass3); color: var(--text); }

.fal-status {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  font-size: .75rem;
  color: var(--text2);
  margin-top: 8px;
}
.fal-status .dot {
  width: 8px; height: 8px; border-radius: 50%;
  box-shadow: 0 0 8px currentColor;
}
.fal-status .dot.ok { background: var(--green); color: var(--green); }
.fal-status .dot.err { background: var(--red); color: var(--red); }

/* ---- Main content — dark glass ---- */
.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px 100px;
  transition: opacity 0.2s ease;
  background: transparent;
  position: relative;
}
.main-content::before, .main-content::after { display: none; }
.main-content.page-enter {
  animation: pageIn 0.25s ease forwards;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- Page header — Station HQ topbar ---- */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin: -24px -32px 24px -32px;
  padding: 18px 32px 16px;
  background: rgba(10,10,15,.7);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border);
  position: sticky;
  top: -24px;
  z-index: 10;
}
.page-header h1 {
  font-family: var(--font-serif);
  font-size: 1.75rem;
  font-weight: 400;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: var(--text);
}
.page-header h1 em {
  font-style: italic;
  background: var(--accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 400;
}
.page-header p {
  color: var(--text2);
  font-size: .82rem;
  margin-top: 6px;
  line-height: 1.5;
}

/* ---- Buttons — glass ---- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: .85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--spring);
  border: none;
}
.btn svg { width: 16px; height: 16px; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px var(--accent-glow); }
.btn-cta {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
  position: relative;
  overflow: hidden;
}
.btn-cta::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}
.btn-cta:hover::before { left: 100%; }
.btn-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
.btn-secondary {
  background: var(--glass2);
  color: var(--text);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
}
.btn-secondary:hover { background: var(--glass3); border-color: var(--glass-border2); }
.btn-danger {
  background: rgba(244,63,94,0.12);
  color: var(--red);
  border: 1px solid rgba(244,63,94,0.25);
}
.btn-danger:hover { background: rgba(244,63,94,0.2); }
.btn-ghost {
  background: transparent;
  color: var(--text2);
  padding: 6px 12px;
  border: 1px solid var(--glass-border2);
}
.btn-ghost:hover { background: var(--glass2); color: var(--text); border-color: var(--glass-border3); }
.btn-lg { padding: 12px 24px; font-size: .92rem; border-radius: var(--radius); }

/* ---- Cards — glass ---- */
.card {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--glass-border);
  transition: all var(--transition);
  position: relative;
  z-index: 1;
  animation: fadeInUp 0.4s ease forwards;
}
.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }
.card:hover { border-color: var(--glass-border2); box-shadow: var(--shadow); transform: translateY(-2px); }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}

/* ---- Stats grid ---- */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 36px;
}
.stat-card { padding: 20px; position: relative; overflow: hidden; }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--accent);
  border-radius: 3px 3px 0 0;
  opacity: 0.7;
}
.stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--green), #6FE893); }
.stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--orange), #FBBF24); }
.stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--pink), #F472B6); }
.stat-value {
  font-family: var(--font-serif);
  font-size: 2.25rem;
  color: var(--text);
  line-height: 1;
  margin: 8px 0 4px;
  font-weight: 400;
}
.stat-label {
  font-size: .82rem;
  color: var(--text2);
}

/* ---- Image grid ---- */
.image-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.image-card {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  group: true;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: all 0.3s ease;
}
.image-card:hover {
  transform: scale(1.03);
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
}
.image-card img {
  width: 100%;
  aspect-ratio: 4/5;
  object-fit: cover;
  display: block;
  transition: var(--transition);
}
.image-card:hover img { transform: scale(1.03); }
.image-card .overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
  opacity: 0;
  transition: var(--transition);
  display: flex;
  align-items: flex-end;
  padding: 16px;
}
.image-card:hover .overlay { opacity: 1; }
.image-card .overlay .actions {
  display: flex;
  gap: 8px;
}
.image-card .overlay .actions button {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: var(--transition);
}
.image-card .overlay .actions button:hover { background: var(--accent); color: #fff; }

.image-card .badge {
  position: absolute;
  top: 12px;
  right: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-completed { background: rgba(62,214,96,0.1); color: #16a34a; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
.badge-generating { background: rgba(118,67,222,0.1); color: #7643DE; border-radius: 20px; }
.badge-pending { background: rgba(150,150,150,0.15); color: #999; }
.badge-failed { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-ratio {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  color: white;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
}

/* ---- Generation form ---- */
.gen-form { max-width: 900px; }
.form-section {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 16px;
  transition: all var(--transition);
  position: relative;
  z-index: 1;
  color: var(--text);
}
.form-section:hover { border-color: var(--glass-border2); }
.form-section-title {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: var(--text2);
  margin-bottom: 14px;
}
.form-row {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.form-group {
  flex: 1;
  min-width: 200px;
}
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--glass-border2);
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: .88rem;
  background: var(--glass);
  color: var(--text);
  backdrop-filter: var(--blur);
  transition: all var(--transition);
}
.form-group input::placeholder,
.form-group textarea::placeholder { color: var(--text3); }
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--accent-solid);
  box-shadow: 0 0 0 3px var(--accent-glow);
  background: var(--glass2);
}
.form-group textarea { min-height: 80px; resize: vertical; }

/* ---- Pill selector ---- */
.pill-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: .78rem;
  font-weight: 600;
  border: 1px solid var(--glass-border2);
  background: var(--glass);
  cursor: pointer;
  transition: all var(--spring);
  color: var(--text2);
  backdrop-filter: var(--blur);
}
.pill:hover { background: var(--glass2); color: var(--text); border-color: var(--glass-border3); transform: translateY(-1px); }
.pill.active {
  background: var(--accent-soft);
  color: var(--accent-solid);
  border-color: var(--accent-solid);
  box-shadow: 0 2px 12px var(--accent-glow);
}

/* ---- Slider ---- */
.slider-container {
  display: flex;
  align-items: center;
  gap: 16px;
}
.slider-container input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 6px;
  background: var(--accent);
  border-radius: 3px;
  border: none;
  padding: 0;
  outline: none;
}
.slider-container input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--text);
  border: 3px solid var(--accent-solid);
  cursor: pointer;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.slider-value { color: var(--text); }
.slider-value {
  font-family: var(--font-serif);
  font-size: 26px;
  min-width: 36px;
  text-align: center;
}

/* ---- Product cards ---- */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.product-grid.compact-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.product-card {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all var(--transition);
  color: var(--text);
}
.product-card h3, .product-card label { color: var(--text); }
.product-card.compact-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px 8px 8px;
  border-radius: 28px;
}
.product-card.compact-pill h3 {
  font-size: 13px;
  margin-bottom: 0;
  white-space: nowrap;
}
.product-card.compact-pill .product-images-row {
  gap: 0;
}
.product-card.compact-pill .product-images-row img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  margin-right: -6px;
}
.product-card.active {
  border-color: var(--accent-solid);
  background: var(--accent-soft);
}
.product-card:hover { border-color: var(--glass-border3); cursor: pointer; background: var(--glass2); }
.product-card.active:hover { border-color: var(--accent-solid); }
.product-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.product-images-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
}
.product-images-row img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border);
}

/* ---- Bottom bar ---- */
.gen-bottom-bar {
  position: sticky;
  bottom: 0;
  margin: 32px -32px -100px;
  background: rgba(10,10,15,.85);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-top: 1px solid var(--glass-border2);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
  color: var(--text);
}
.gen-summary {
  font-size: .82rem;
  color: var(--text2);
}
.gen-summary strong { color: var(--accent-solid); font-size: .92rem; font-weight: 700; }
.btn-cta.btn-lg.gen-main-cta {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  font-size: .92rem;
  padding: 12px 28px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: all var(--spring);
  box-shadow: 0 4px 16px var(--accent-glow);
  position: relative;
  overflow: hidden;
}
.btn-cta.btn-lg.gen-main-cta::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s;
}
.btn-cta.btn-lg.gen-main-cta:hover::before { left: 100%; }
.btn-cta.btn-lg.gen-main-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

<body>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo" onclick="navigate('home')">
      <span style="font-size:28px;">🍄</span>

    <nav>
      <div class="nav-section">

        <button class="nav-item" data-page="home" onclick="navigate('home')">

        <button class="nav-item" data-page="studio" onclick="navigate('studio')">

        <button class="nav-item" data-page="inspirations" onclick="navigate('inspirations')">

          Inspirations
        </button>
        <button class="nav-item" data-page="trending" onclick="navigate('trending')">

          Concurrents
          <span style="margin-left:auto;font-size:9px;background:linear-gradient(135deg,#ef4444,#f97316);color:white;padding:2px 6px;border-radius:8px;font-weight:600;">HOT</span>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Compte & Espace</div>
        <button class="nav-item" data-page="settings" onclick="navigate('settings')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Parametres
        </button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="fal-status" id="fal-status">
        <span class="dot err"></span>
        <span>FAL API</span>
      </div>
    </div>

  <!-- Main -->
  <main class="main-content" id="main-content">
    <!-- Pages rendered here by JS -->
  </main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="close-btn" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ============================================================
// Créa Studio Frontend — SPA Logic
// ============================================================

const API = '';
let currentPage = (location.hash && location.hash.slice(1)) || 'home';
let state = {
  stats: {},
  brands: [],
  currentBrand: null,
  products: [],
  generations: [],
  falConfigured: false,
  strategy: null,
  competitors: [],
  selectedProductId: '',
  batchLanguage: 'fr',
  selectedFormats: ['4:5'],
  studioFilter: null,
  studioStatusFilter: 'all',  // all | draft | to_test | winner | killed
  studioPersonaFilter: 'all',
  studioBatchFilter: 'all',
  studioImages: [],
  selectedStructure: null,
  structures: [],
  anglePresets: {},
  // Modal state
  showInsightModal: false,
  showVariantModal: false,
  showPersonaModal: false,
  insightImageId: null,
  variantSourceImageId: null,
  personaSourceImageId: null,
};

// Polling for active generations
let genPollInterval = null;

// ---- Navigation ----
function navigate(page) {
  currentPage = page;
  location.hash = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  renderPage();
}

function renderPage() {
  const main = document.getElementById('main-content');
  main.classList.remove('page-enter');
  void main.offsetWidth; // force reflow
  main.classList.add('page-enter');
  try {
    switch (currentPage) {
      case 'home': renderHome(main); break;
      case 'brand': renderBrand(main); break;
      case 'generate': renderGenerate(main); break;
      case 'studio': renderStudio(main); break;
      case 'inspirations': renderInspirations(main); break;
      case 'trending': renderTrending(main); break;
      case 'competitors': renderCompetitors(main); break;
      case 'settings': renderSettings(main); break;
    }
  } catch(e) {
    console.error('Render error:', e);
    main.innerHTML = `<div style="color:red;padding:40px;"><h2>Erreur de rendu: ${currentPage}</h2><pre>${e.message}\n${e.stack}</pre></div>`;
  }
  // Mount studio modals as overlays at body level (any page)
  try { mountStudioModals(); } catch (e) { console.warn('mountStudioModals failed:', e); }
}

// ---- API helpers ----
async function api(path, options = {}) {
  const resp = await fetch(API + path, options);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || 'API Error');
  }
  return resp.json();
}

async function loadState() {
  try {
    const [stats, brands, gens, falStatus, inspirations, templates, structures, anglePresets] = await Promise.all([
      api('/api/stats'),
      api('/api/brands'),
      api('/api/generations'),
      api('/api/fal-status'),
      api('/api/inspirations'),
      api('/api/templates'),
      api('/api/structures').catch(() => []),
      api('/api/angles').catch(() => ({})),
    ]);
    state.stats = stats;
    state.brands = brands;
    state.generations = gens;
    state.falConfigured = falStatus.configured;
    state.inspirations = inspirations || [];
    state.templates = templates || [];
    state.structures = structures || [];
    state.anglePresets = anglePresets || {};

    // Update FAL status dot
    const dot = document.querySelector('#fal-status .dot');
    const label = document.querySelector('#fal-status span:last-child');
    if (state.falConfigured) {
      dot.className = 'dot ok';
      label.textContent = 'FAL API connectee';
    } else {
      dot.className = 'dot err';
      label.textContent = 'FAL API non configuree';
    }

    // Auto-select first brand
    if (brands.length > 0 && !state.currentBrand) {
      state.currentBrand = brands[0];
      const products = await api(`/api/brands/${brands[0].id}/products`);
      state.products = products;
      if (state.products.length && !state.selectedProductId) {
        state.selectedProductId = state.products[0].id;
      }
    }

    // Load strategy & competitors for current brand
    if (brands.length > 0) {
      const brandId = state.currentBrand?.id || brands[0].id;
      const [strategy, competitors] = await Promise.all([
        api(`/api/brands/${brandId}/strategy`).catch(() => null),
        api(`/api/brands/${brandId}/competitors`).catch(() => []),
      ]);
      state.strategy = strategy;
      state.competitors = competitors || [];
    }
  } catch (e) {
    console.error('Load state error:', e);
  }
}

// ---- HOME PAGE ----
function renderHome(el) {
  const s = state.stats;
  const recentGens = state.generations.slice(0, 5);
  const brandName = state.currentBrand?.name || 'Créa Studio';

  el.innerHTML = `
    <div class="page-header">
      <div>
        <h1>Bienvenue, <em>${brandName}</em></h1>
        <p>Voici l'etat de votre empire creatif aujourd'hui.</p>
      </div>
      <button class="btn btn-primary btn-lg" onclick="navigate('generate')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Nouveau Batch
      </button>
    </div>

    <div class="stats-grid">
      <div class="card stat-card">
        <div class="card-title">Total Creations</div>
        <div class="stat-value">${s.total_images || 0}</div>
        <div class="stat-label">Images generees par l'IA</div>
      </div>
      <div class="card stat-card">
        <div class="card-title">Generations</div>
        <div class="stat-value">${s.total_generations || 0}</div>
        <div class="stat-label">Batches lances</div>
      </div>
      <div class="card stat-card">
        <div class="card-title">Marques Actives</div>
        <div class="stat-value">${s.brands || 0}</div>
        <div class="stat-label">Profils configures</div>
      </div>
      <div class="card stat-card">
        <div class="card-title">Produits</div>
        <div class="stat-value">${s.products || 0}</div>
        <div class="stat-label">Avec packshots</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">
        <div class="card-title">INTELLIGENCE CONCURRENTIELLE</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3, 1fr);gap:16px;">
        <div style="text-align:center;padding:16px;background:rgba(118,67,222,0.04);border-radius:12px;">
          <div style="font-size:28px;font-weight:700;color:var(--accent);">6225mg</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Ton dosage (n1 FR)</div>
        </div>
        <div style="text-align:center;padding:16px;background:rgba(239,68,68,0.04);border-radius:12px;">
          <div style="font-size:28px;font-weight:700;color:#ef4444;">2700mg</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Bonjour Drink</div>
        </div>
        <div style="text-align:center;padding:16px;background:rgba(239,68,68,0.04);border-radius:12px;">
          <div style="font-size:28px;font-weight:700;color:#ef4444;">1650mg</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Drink Dyna</div>
        </div>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin-top:12px;text-align:center;">Tu as 2.3x plus d'adaptogenes que ton concurrent direct. Utilise ca dans tes creas.</p>
    </div>

    <h2 style="font-size:20px;font-weight:700;margin-bottom:16px;">Dernieres Creations</h2>
    ${recentGens.length > 0 ? `
      <div class="image-grid">
        ${recentGens.flatMap(g => g.images.map(img => `
          <div class="image-card" onclick="openLightbox('/api/image/${img.id}')">
            <img src="/api/image/${img.id}" alt="${img.filename}" loading="lazy">
            <span class="badge badge-${g.status}">${g.status}</span>
            <span class="badge-ratio">${g.aspect_ratio || '4:5'}</span>
            <div class="overlay">
              <div class="actions">
                <button onclick="event.stopPropagation(); downloadImage('/api/image/${img.id}', '${img.filename}')">Telecharger</button>
                <button onclick="event.stopPropagation(); deleteGenImage('${img.id}')">Supprimer</button>
              </div>
            </div>
          </div>
        `)).join('')}
      </div>
    ` : `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <h3>Aucune creation pour l'instant</h3>
        <p>Lancez votre premier batch pour commencer.</p>
      </div>
    `}
  `;
}

// ---- BRAND PAGE ----
function renderBrand(el) {
  const brand = state.currentBrand;

  el.innerHTML = `
    <div class="page-header">
      <div>
        <h1>Ma <em>Marque</em></h1>
        <p>Gerez votre profil de marque et vos photos produits.</p>
      </div>
      <button class="btn btn-primary" onclick="showBrandModal()">
        ${brand ? 'Editer le profil' : 'Creer une marque'}
      </button>
    </div>

    ${brand ? `
      <div class="card" style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:16px;">
          <div style="width:56px;height:56px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#111;">
            ${brand.name.charAt(0).toUpperCase()}
          </div>
          <div>
            <h2 style="font-size:20px;font-weight:600;">${brand.name}</h2>
            ${brand.url ? `<p style="font-size:13px;color:var(--text-muted);">${brand.url}</p>` : ''}
          </div>
        </div>
      </div>
    ` : `
      <div class="empty-state">
        <h3>Aucune marque configuree</h3>
        <p>Creez votre profil de marque pour commencer a generer des creas.</p>
        <button class="btn btn-primary" style="margin-top:16px;" onclick="showBrandModal()">Creer une marque</button>
      </div>
    `}

    ${brand ? `
      <div class="card">
        <div class="card-header">
          <div>
            <span class="card-title">Photos Produits</span>
            <span style="background:var(--accent);color:#111;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin-left:8px;">${state.products.reduce((s, p) => s + (p.images?.length || 0), 0)} total</span>
          </div>
          <button class="btn btn-secondary" onclick="showProductModal()">Ajouter un produit +</button>
        </div>

        ${state.products.length > 0 ? `
          <div class="product-grid">
            ${state.products.map(p => `
              <div class="product-card">
                <h3>${p.name}</h3>
                <div class="product-images-row">
                  ${(p.images || []).map(img => `
                    <img src="/api/image/${img.id}" alt="${img.filename}" onclick="openLightbox('/api/image/${img.id}')">
                  `).join('')}
                  ${(p.images || []).length === 0 ? '<span style="color:var(--text-muted);font-size:13px;">Aucune image</span>' : ''}
                </div>
                <div style="margin-top:10px;">
                  <input type="text" placeholder="URL page produit..." value="${p.page_url||''}" onchange="updateProduct('${p.id}', {page_url: this.value})" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font-sans);background:var(--bg-main);margin-bottom:6px;">
                  <textarea placeholder="Brief produit..." onchange="updateProduct('${p.id}', {brief: this.value})" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font-sans);background:var(--bg-main);min-height:50px;resize:vertical;">${p.brief||''}</textarea>
                </div>
                <div style="margin-top:8px;display:flex;gap:8px;">
                  <button class="btn btn-ghost" onclick="addImagesToProduct('${p.id}')">+ Images</button>
                  <span style="font-size:12px;color:var(--text-muted);line-height:32px;">${(p.images || []).length} photo(s)</span>
                </div>
              </div>
            `).join('')}
          </div>
        ` : `
          <div class="empty-state" style="padding:32px;">
            <p>Ajoutez vos produits et packshots pour ameliorer la generation.</p>
          </div>
        `}
      </div>

      <!-- Strategy Section -->
      <div class="strategy-section">
        <h2 style="font-family:var(--font-serif);font-size:24px;margin:32px 0 16px;">Strategie <em style="color:var(--accent);font-style:italic;">Creative</em></h2>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Avatar Client</span>
          </div>
          <div class="form-group">
            <label>Description de l'avatar</label>
            <textarea id="strat-avatar" rows="3" placeholder="Ex: Homme/femme 25-40 ans, actif(ve), consomme du cafe, veut performer sans crash...">${state.strategy?.avatar_description || ''}</textarea>
          </div>
          <div class="form-group">
            <label>Pain Points</label>
            <div class="tags-input" id="strat-pains" onclick="this.querySelector('input')?.focus()">
              ${(state.strategy?.avatar_pain_points || []).map(p => `<span class="tag">${p} <button onclick="this.parentElement.remove()">&times;</button></span>`).join('')}
              <input type="text" placeholder="Ajouter un pain point..." onkeydown="handleTagInput(event, 'strat-pains')">
            </div>
            <div class="tag-suggestions">
              ${['Ballonnements', 'Crash cafe', 'Manque de focus', 'Stress chronique', 'Fatigue', 'Sommeil perturbe', 'Digestion difficile', 'Anxiete'].map(s =>
                `<button onclick="addSuggestedTag('strat-pains', '${s}')">${s}</button>`
              ).join('')}
            </div>
          </div>
          <div class="form-group">
            <label>Desires</label>
            <div class="tags-input" id="strat-desires" onclick="this.querySelector('input')?.focus()">
              ${(state.strategy?.avatar_desires || []).map(d => `<span class="tag">${d} <button onclick="this.parentElement.remove()">&times;</button></span>`).join('')}
              <input type="text" placeholder="Ajouter un desir..." onkeydown="handleTagInput(event, 'strat-desires')">
            </div>
            <div class="tag-suggestions">
              ${['Energie stable', 'Focus au travail', 'Mieux dormir', 'Zen au quotidien', 'Performance mentale', 'Alternative saine', 'Ingredients naturels'].map(s =>
                `<button onclick="addSuggestedTag('strat-desires', '${s}')">${s}</button>`
              ).join('')}
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Positionnement</span>
          </div>
          <div class="form-group">
            <label>USP (Proposition de valeur unique)</label>
            <textarea id="strat-usp" rows="2" placeholder="Ex: Le premier cafe adapto francais qui remplace ton cafe sans compromis...">${state.strategy?.usp || ''}</textarea>
          </div>
          <div class="form-group">
            <label>Offres</label>
            <div class="tags-input" id="strat-offers" onclick="this.querySelector('input')?.focus()">
              ${(state.strategy?.offers || []).map(o => `<span class="tag">${o} <button onclick="this.parentElement.remove()">&times;</button></span>`).join('')}
              <input type="text" placeholder="Ajouter une offre..." onkeydown="handleTagInput(event, 'strat-offers')">
            </div>
          </div>
          <div class="form-group">
            <label>Ton de voix</label>
            <textarea id="strat-tone" rows="2" placeholder="Ex: Direct, cool, scientifique mais accessible, jamais condescendant...">${state.strategy?.tone_of_voice || ''}</textarea>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Concurrents</span>
            <button class="btn btn-secondary" onclick="toggleCompetitorForm()" style="font-size:12px;padding:6px 14px;">Ajouter un concurrent +</button>
          </div>
          <div class="competitor-list" id="competitor-list">
            ${(state.competitors || []).map(c => `
              <div class="competitor-row">
                <div>
                  <div class="comp-name">${c.name}</div>
                  ${c.url ? `<div class="comp-url">${c.url}</div>` : ''}
                </div>
                <span class="comp-badge ${c.type || 'direct'}">${c.type || 'direct'}</span>
                ${c.market ? `<span class="comp-badge market">${c.market}</span>` : ''}
                <button class="comp-delete" onclick="deleteCompetitor('${c.id}')" title="Supprimer">&times;</button>
              </div>
            `).join('')}
            ${(state.competitors || []).length === 0 ? '<p style="font-size:13px;color:var(--text-muted);padding:8px 0;">Aucun concurrent ajoute.</p>' : ''}
          </div>
          <div id="competitor-form-wrapper" style="display:none;">
            <div class="competitor-form">
              <div class="form-group" style="flex:2;">
                <label>Nom</label>
                <input type="text" id="comp-name" placeholder="Ex: RYZE">
              </div>
              <div class="form-group" style="flex:2;">
                <label>URL</label>
                <input type="text" id="comp-url" placeholder="https://...">
              </div>
              <div class="form-group" style="flex:1;">
                <label>Type</label>
                <select id="comp-type">
                  <option value="direct">Direct</option>
                  <option value="indirect">Indirect</option>
                </select>
              </div>
              <div class="form-group" style="flex:1;">
                <label>Marche</label>
                <select id="comp-market">
                  <option value="EU">EU</option>
                  <option value="Non-EU">Non-EU</option>
                  <option value="Worldwide">Worldwide</option>
                </select>
              </div>
              <button class="btn btn-primary" onclick="addCompetitor()" style="padding:8px 16px;font-size:12px;align-self:flex-end;">Ajouter</button>
            </div>
            <div class="tag-suggestions" style="margin-top:8px;">
              <span style="font-size:11px;color:var(--text-muted);margin-right:4px;">Suggestions:</span>
              ${[
                {name:'RYZE',url:'ryzesuperfoods.com',type:'direct'},

function renderCompetitiveAngles() {
  const container = document.getElementById('competitive-angles-container');
  if (!container) return;

  const presets = state.anglePresets || {};
  const keys = Object.keys(presets);

  if (keys.length > 0) {
    const labelMap = {
      'ballonnements': 'Ballonnements',
      'crash_energie': 'Crash energie',
      'focus': 'Focus',
      'alternative_cafe': 'Alt. cafe',
      'stress': 'Stress',
      'naturel': 'Naturel',
      'prix': 'Prix',
      'social_proof': 'Social proof'
    };
    let html = '<div style="margin-top:12px;">';
    html += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:600;">ANGLES VALIDES PAR LA CONCURRENCE :</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    keys.forEach(function(key) {
      var angles = presets[key];
      var angleVal = (angles[0] || '').replace(/'/g, "\\'");
      var label = labelMap[key] || key;
      html += '<button class="pill" onclick="document.getElementById(\'angle-input\').value=\'' + angleVal + '\'" style="font-size:11px;padding:5px 12px;">' + label + '</button>';
    });
    html += '</div></div>';
    container.innerHTML = html;
  } else {
    var suggestions = ['Mettre en avant le -20%','Lancement de produit','Alternative au cafe','Anti-ballonnements','Energie sans crash','Focus & concentration'];
    var html = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">';
    suggestions.forEach(function(s) {
      html += '<button class="pill" onclick="document.getElementById(\'angle-input\').value=\'' + s + '\'" style="font-size:11px;padding:4px 10px;cursor:pointer;background:var(--accent-secondary-bg);color:#8a8520;border-color:rgba(249,247,132,0.3);">' + s + '</button>';
    });
    html += '</div>';
    container.innerHTML = html;
  }
}

function updateSummary() {
  const count = document.getElementById('gen-count')?.value || '4';
  state.genCount = parseInt(count);
  const res = document.querySelector('#resolution-pills .pill.active')?.dataset.value || '2K';
  const sc = document.getElementById('summary-count');
  const sf = document.getElementById('summary-format');
  const sr = document.getElementById('summary-res');
  if (sc) sc.textContent = count;
  if (sf) sf.textContent = state.selectedFormats.join(', ');
  if (sr) sr.textContent = res;
}

function toggleFormat(fmt) {
  const idx = state.selectedFormats.indexOf(fmt);
  if (idx > -1 && state.selectedFormats.length > 1) {
    state.selectedFormats.splice(idx, 1);
  } else if (idx === -1) {
    state.selectedFormats.push(fmt);
  }
  renderPage();
}

function toggleCollapsible(header) {
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function handleTagInput(e, containerId) {
  if (e.key === 'Enter' && e.target.value.trim()) {
    e.preventDefault();
    const container = document.getElementById(containerId);
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${e.target.value.trim()} <button onclick="this.parentElement.remove()">&times;</button>`;
    container.insertBefore(tag, e.target);
    e.target.value = '';
  }
}

function getTags(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} .tag`))
    .map(t => t.textContent.replace('×', '').trim());
}

function setAngle(btn) {
  const input = document.getElementById('angle-input');
  if (input) input.value = btn.dataset.value;
  document.querySelectorAll('#angle-suggestions .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
}

// Quick upload of competitor creative directly in Generation page
let quickUploadFiles = [];

function handleQuickUpload(input) {
  if (input.files && input.files.length > 0) {
    quickUploadFiles = Array.from(input.files);
    showQuickPreviews(quickUploadFiles);
  }
}

function handleQuickDrop(event) {
  event.preventDefault();
  const zone = document.getElementById('quick-upload-zone');
  zone.style.borderColor = 'var(--border)';
  zone.style.background = '';
  if (event.dataTransfer.files && event.dataTransfer.files.length > 0) {
    quickUploadFiles = Array.from(event.dataTransfer.files);
    showQuickPreviews(quickUploadFiles);
  }
}

function showQuickPreviews(files) {
  const thumbsContainer = document.getElementById('quick-upload-thumbs');
  if (!thumbsContainer) return;
  thumbsContainer.innerHTML = '';
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.style.cssText = 'max-height:80px;border-radius:8px;object-fit:cover;';
      thumbsContainer.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('quick-upload-preview').style.display = 'block';
  document.getElementById('quick-upload-placeholder').style.display = 'none';
  // Clear library selection
  document.querySelectorAll('#inspo-selector .product-card').forEach(c => c.classList.remove('active'));
}

function clearQuickUpload() {
  quickUploadFiles = [];
  const preview = document.getElementById('quick-upload-preview');
  const placeholder = document.getElementById('quick-upload-placeholder');
  if (preview) preview.style.display = 'none';
  if (placeholder) placeholder.style.display = '';
  const input = document.getElementById('quick-upload-input');
  if (input) input.value = '';
}

  const brand = state.currentBrand;
  if (!brand) return alert('Configurez d\'abord votre marque.');

  const productId = document.querySelector('.product-card.active')?.dataset?.productId || '';
  const count = document.getElementById('gen-count')?.value || 4;
  const formats = state.selectedFormats || ['4:5'];
  const resolution = document.querySelector('#resolution-pills .pill.active')?.dataset.value || '2K';
  const angle = document.getElementById('angle-input')?.value || '';
  const customPrompt = document.getElementById('custom-prompt')?.value || '';
  let styleRefId = document.querySelector('#inspo-selector .product-card.active')?.dataset?.inspoId || '';
  const funnelStage = document.querySelector('#funnel-pills .pill.active')?.dataset.value || '';
  const language = state.batchLanguage || 'fr';

  if (!angle && !customPrompt) return alert('Ecris un angle marketing ou un prompt personnalise.');
  if (!productId) return alert('Selectionne un produit.');

  // If quick upload files exist, upload the first as inspiration
  if (quickUploadFiles.length > 0 && !styleRefId) {
    try {
      const uploadForm = new FormData();
      uploadForm.append('brand_id', brand.id);
      uploadForm.append('label', 'Quick ref - ' + (angle || 'generation'));
      uploadForm.append('source', 'quick-upload');
      for (const f of quickUploadFiles) uploadForm.append('images', f);
      const uploadResult = await fetch('/api/inspirations', { method: 'POST', body: uploadForm });
      const uploaded = await uploadResult.json();
      if (uploaded && uploaded[0]) styleRefId = uploaded[0].id;
    } catch (e) { console.error('Quick upload failed:', e); }
  }

  // Prepend funnel context to the angle
  const angleWithFunnel = funnelStage ? `[${funnelStage}] ${angle}` : angle;

  const formData = new FormData();
  formData.append('brand_id', brand.id);
  formData.append('product_id', productId);
  formData.append('num_creations', count);
  formData.append('aspect_ratio', formats[0]);
  formData.append('resolution', resolution);
  formData.append('marketing_messages', JSON.stringify(angleWithFunnel ? [angleWithFunnel] : []));
  formData.append('customer_reviews', JSON.stringify([]));
  formData.append('custom_prompt', customPrompt);
  formData.append('style_ref_id', styleRefId);
  formData.append('language', language);
  formData.append('formats', JSON.stringify(formats));
  if (state.selectedStructure) formData.append('structure_id', state.selectedStructure);

  try {
    const result = await fetch('/api/generate', { method: 'POST', body: formData });
    const data = await result.json();
    if (data.id) {
      navigate('studio');
      startPolling();
      await loadState();
      renderPage();
    }
  } catch (e) {
    alert('Erreur: ' + e.message);
  }
}

function renderStudio(el) {
  console.log('renderStudio called, gens:', state.generations?.length);
  const gens = state.generations;
  const allImages = gens.flatMap(g => g.images.map(img => ({ ...img, gen: g })));
  const activeGens = gens.filter(g => g.status === 'pending' || g.status === 'generating');

  // Mirror flat images list onto state for setImageStatus / mutations
  state.studioImages = allImages;

  if (activeGens.length > 0) startPolling();

  // Status filter (status_tag from API: draft / to_test / winner / killed)
  // Backward compat: legacy `rating` field maps to winner / killed.
  const getStatus = (img) => {
    if (img.status_tag) return img.status_tag;
    if (img.rating === 'winner') return 'winner';
    if (img.rating === 'kill') return 'killed';
    return 'draft';
  };

  const matchesStatus = (img) => {
    if (state.studioStatusFilter === 'all') return true;
    return getStatus(img) === state.studioStatusFilter;
  };

  // Legacy filter kept for compat with rateImage flow
  const matchesLegacy = (img) => {
    if (!state.studioFilter) return true;
    if (state.studioFilter === 'winner') return img.rating === 'winner';
    if (state.studioFilter === 'kill') return img.rating === 'kill';
    if (state.studioFilter === 'unrated') return !img.rating;
    return true;
  };

  const filterImages = (images) => images.filter(img => matchesStatus(img) && matchesLegacy(img));

  // Counts for status pills
  const counts = { all: allImages.length, draft: 0, to_test: 0, winner: 0, killed: 0 };
  allImages.forEach(img => { counts[getStatus(img)] = (counts[getStatus(img)] || 0) + 1; });

  const statusPill = (value, label) => `
    <button class="pill ${state.studioStatusFilter === value ? 'active' : ''}"
      onclick="state.studioStatusFilter='${value}';renderPage()">
      ${label} <span style="opacity:0.6;margin-left:4px;">${counts[value] || 0}</span>
    </button>
  `;

  const statusBadge = (img) => {
    const s = getStatus(img);
    const labels = { draft: 'Draft', to_test: 'A tester', winner: 'Winner', killed: 'Killed' };
    return `<span class="status-badge ${s}">${labels[s] || s}</span>`;

// ---- Rating, Iteration, Batch ----
async function saveComment(imageId, comment) {
  try {
    await fetch(`/api/generated-images/${imageId}/comment`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comment })
    });
  } catch(e) { console.error('Failed to save comment:', e); }
}

async function rateImage(imageId, rating) {
  try {
    await fetch(`/api/generated-images/${imageId}/rate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rating })
    });
    await loadState();
    renderPage();
    // Focus the comment input after re-render
    setTimeout(() => {
      const commentInput = document.querySelector(`[data-comment-id="${imageId}"]`);
      if (commentInput) {
        commentInput.style.borderColor = rating === 'winner' ? '#22c55e' : '#ef4444';
        commentInput.focus();
        commentInput.placeholder = rating === 'winner' ? "Pourquoi c'est bien ?" : "Pourquoi c'est pas bien ?";
      }
    }, 100);
  } catch (e) { alert('Erreur: ' + e.message); }
}

async function iterateImage(imageId, brandId, productId, aspectRatio) {
  const angle = prompt('Angle pour l\'iteration (ou laisser vide pour varier le style):') || '';
  const formData = new FormData();
  formData.append('brand_id', brandId);
  formData.append('product_id', productId || '');
  formData.append('num_creations', '2');
  formData.append('aspect_ratio', aspectRatio || '4:5');
  formData.append('resolution', '2K');
  formData.append('marketing_messages', JSON.stringify(angle ? [angle] : []));
  formData.append('customer_reviews', '[]');
  formData.append('custom_prompt', '');
  formData.append('iteration_of', imageId);
  try {
    const result = await fetch('/api/generate', { method: 'POST', body: formData });
    const data = await result.json();
    if (data.id) {
      navigate('studio');
      startPolling();
      await loadState();
      renderPage();
    }
  } catch (e) { alert('Erreur: ' + e.message); }
}

async function launchBatchAngles() {
  const brand = state.currentBrand;
  if (!brand) return alert('Configurez d\'abord votre marque.');
  const productId = state.products[0]?.id;
  if (!productId) return alert('Ajoutez un produit d\'abord.');
  if (!confirm('Generer 8 creas (1 par angle) ? Cela utilisera 8 credits FAL.')) return;

  const formData = new FormData();
  formData.append('brand_id', brand.id);
  formData.append('product_id', productId);
  formData.append('aspect_ratio', '4:5');
  formData.append('resolution', '2K');
  try {
    const result = await fetch('/api/generate-batch-angles', { method: 'POST', body: formData });
    const data = await result.json();
    if (data.gen_ids) {
      navigate('studio');
      startPolling();
      await loadState();
      renderPage();
    }
  } catch (e) { alert('Erreur: ' + e.message); }
}

// ---- Inspiration Library ----
async function uploadInspirations() {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = 'image/*';
  input.onchange = async () => {
    const formData = new FormData();
    formData.append('brand_id', state.currentBrand.id);
    formData.append('label', '');
    formData.append('source', '');
    for (const f of input.files) formData.append('images', f);
    try {
      await fetch('/api/inspirations', { method: 'POST', body: formData });
      await loadState();
      renderPage();
    } catch (e) { alert('Erreur: ' + e.message); }
  };
  input.click();
}

async function refreshAdDoctor() {
  const btn = document.getElementById('ad-doctor-refresh');
  if (!btn) return;
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ Sync en cours... (~60s)';
  btn.disabled = true;
  try {
    const res = await fetch('/api/ad-doctor/refresh', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      btn.innerHTML = `✅ ${data.count} ads sync`;
      setTimeout(() => { btn.innerHTML = originalText; btn.disabled = false; }, 2000);
      loadMyTopAds(); // Reload data
    } else {
      btn.innerHTML = '❌ Erreur';
      alert('Erreur Ad Doctor : ' + (data.error || 'inconnu'));
      setTimeout(() => { btn.innerHTML = originalText; btn.disabled = false; }, 2000);
    }
  } catch (e) {
    btn.innerHTML = '❌ Erreur réseau';
    setTimeout(() => { btn.innerHTML = originalText; btn.disabled = false; }, 2000);
  }
}

function _selectBrainstoorm() {
  // Find Brainstoorm product (default for MNG)
  const brainstoorm = (state.products || []).find(p =>
    /brainstoorm/i.test(p.name || '')
  );
  if (brainstoorm) {
    state.selectedProductId = brainstoorm.id;
    return brainstoorm;
  }
  // Fallback: first product
  if (state.products && state.products.length) {
    state.selectedProductId = state.products[0].id;
    return state.products[0];
  }
  return null;
}

async function navigateToGenerateWithIteration(adName, iterationType, action, thumbnailUrl) {
  // 1. Auto-select Brainstoorm
  const product = _selectBrainstoorm();

  // 2. If we have a thumbnail (the source ad to iterate), clone it as inspiration
  let inspoId = null;
  if (thumbnailUrl) {
    try {
      const imgRes = await fetch(thumbnailUrl);
      const blob = await imgRes.blob();
      const file = new File([blob], `iter_${Date.now()}.jpg`, {type: blob.type || 'image/jpeg'});
      const fd = new FormData();
      fd.append('file', file);
      fd.append('label', `Source itération : ${adName.slice(0,40)}`);
      fd.append('source', 'iteration');
      const brand = state.currentBrand;
      if (brand) {
        const res = await fetch(`/api/inspirations?brand_id=${brand.id}`, {method:'POST', body: fd});
        const data = await res.json();
        inspoId = data.id || null;
      }
    } catch(e) { console.warn('Inspo clone failed', e); }
  }

  state.iterationContext = { adName, iterationType, action, sourceInspoId: inspoId };
  navigate('generate');
  setTimeout(() => {
    const angleInput = document.getElementById('angle-input');
    if (angleInput) {
      angleInput.value = `Itération : ${action}`;
      angleInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 300);
}

async function cloneCompetitorToGenerate(thumbnailUrl, brandName, headline) {
  // 1-click clone: download competitor ad → save as inspiration → select Brainstoorm → go to generate
  if (!thumbnailUrl) return alert('Image indisponible');
  const product = _selectBrainstoorm();
  if (!product) return alert('Aucun produit configuré');
  const brand = state.currentBrand;
  if (!brand) return alert('Aucune marque configurée');

  try {
    // Download + upload as inspiration
    const imgRes = await fetch(thumbnailUrl);
    const blob = await imgRes.blob();
    const safeName = brandName.replace(/[^a-z0-9]/gi,'_');
    const file = new File([blob], `${safeName}_clone_${Date.now()}.jpg`, {type: blob.type || 'image/jpeg'});
    const fd = new FormData();
    fd.append('file', file);
    fd.append('label', `Clone : ${brandName}`);
    fd.append('source', 'competitor_clone');
    const res = await fetch(`/api/inspirations?brand_id=${brand.id}`, {method:'POST', body: fd});
    const data = await res.json();

    // Reload inspirations into state
    state.inspirations = await api(`/api/inspirations?brand_id=${brand.id}`);

    // Set the cloned inspo as the style ref + Brainstoorm as product
    state.styleRefId = data.id;
    state.iterationContext = {
      adName: brandName + ' — clone',
      iterationType: 'competitor_clone',
      action: `Cloner cette créa ${brandName} avec MNG ${product.name}`,
      sourceInspoId: data.id,
    };

    navigate('generate');
    setTimeout(() => {
      const angleInput = document.getElementById('angle-input');
      if (angleInput) {
        angleInput.value = headline ? `Adapter à MNG : ${headline.slice(0,60)}` : `Cloner ${brandName} avec ${product.name}`;
        angleInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 300);
  } catch (e) {
    alert('Erreur : ' + e.message);
  }
}

async function loadTrendingAds() {
  state.trending = state.trending || { ads: [], loading: false, period: 'rankDelta7d', mediaType: 'image', credits: '?' };
  state.trending.loading = true;
  renderPage();
  try {
    const res = await api(`/api/trendtrack/top-ads?period=${state.trending.period}&media_type=${state.trending.mediaType}&limit=60`);
    state.trending.ads = res.ads || [];
    state.trending.credits = res.credits_remaining || '?';
    state.trending.loading = false;
    renderPage();
  } catch (e) {
    state.trending.loading = false;
    state.trending.ads = [];
    renderPage();
    alert('Erreur TrendTrack : ' + e.message);
  }
}

  formData.append('url', document.getElementById('brand-url').value);
  formData.append('description', document.getElementById('brand-desc').value);
  formData.append('brand_dna', document.getElementById('brand-dna').value);

  try {
    if (state.currentBrand) {
      await fetch(`/api/brands/${state.currentBrand.id}`, { method: 'PUT', body: formData });
    } else {
      await fetch('/api/brands', { method: 'POST', body: formData });

    closeModal();

async function saveProduct(e) {
  e.preventDefault();
  if (!state.currentBrand) return alert('Creez d\'abord une marque.');

  const formData = new FormData();
  formData.append('name', document.getElementById('product-name').value);
  const files = document.getElementById('product-files').files;
  for (const file of files) {
    formData.append('images', file);
  }

  try {
    await fetch(`/api/brands/${state.currentBrand.id}/products`, { method: 'POST', body: formData });
    closeModal();
    // Reload products
    state.products = await api(`/api/brands/${state.currentBrand.id}/products`);
    await loadState();
    renderPage();
  } catch (e) {
    alert('Erreur: ' + e.message);
  }
}

async function addImagesToProduct(productId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = 'image/*';
  input.onchange = async () => {
    const formData = new FormData();
    for (const file of input.files) {
      formData.append('images', file);
    }
    try {
      await fetch(`/api/products/${productId}/images`, { method: 'POST', body: formData });
      state.products = await api(`/api/brands/${state.currentBrand.id}/products`);
      await loadState();
      renderPage();
    } catch (e) {
      alert('Erreur: ' + e.message);
    }
  };
  input.click();
}

async function downloadImage(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function downloadAllImages() {

  for (const img of allImages) {
    await downloadImage(`/api/image/${img.id}`, img.filename);
    await new Promise(r => setTimeout(r, 200));
  }
}

async function deleteGeneration(genId) {

// ---- Polling ----
function startPolling() {
  if (genPollInterval) return;
  genPollInterval = setInterval(async () => {
    const gens = await api('/api/generations');
    const active = gens.filter(g => g.status === 'pending' || g.status === 'generating');
    const changed = JSON.stringify(gens.map(g => g.images.length)) !== JSON.stringify(state.generations.map(g => g.images.length));
    state.generations = gens;
    if (changed) renderPage();
    if (active.length === 0) {
      clearInterval(genPollInterval);
      genPollInterval = null;
      await loadState();
      renderPage();
    }
  }, 3000);
}

// ---- Strategy & Competitors ----
function addSuggestedTag(containerId, value) {
  const container = document.getElementById(containerId);
  if (!container) return;
  // Check if tag already exists
  const existing = getTags(containerId);
  if (existing.includes(value)) {
    // Visual feedback that it's already there
    const tags = container.querySelectorAll('.tag');
    tags.forEach(t => {
      if (t.textContent.replace('×','').trim() === value) {
        t.style.transition = 'background 0.3s';
        const orig = t.style.background;
        t.style.background = '#fbbf24';
        setTimeout(() => { t.style.background = orig; }, 600);
      }
    });
    return;
  }
  const input = container.querySelector('input');
  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.innerHTML = `${value} <button onclick="this.parentElement.remove()">&times;</button>`;
  // Animate insertion
  tag.style.opacity = '0';
  tag.style.transform = 'scale(0.8)';
  container.insertBefore(tag, input);
  requestAnimationFrame(() => {
    tag.style.transition = 'opacity 0.2s, transform 0.2s';
    tag.style.opacity = '1';
    tag.style.transform = 'scale(1)';
  });
  // Auto-save strategy after click
  if (typeof saveStrategy === 'function' && (containerId === 'strat-pains' || containerId === 'strat-desires' || containerId === 'strat-offers')) {
    clearTimeout(window._stratSaveTimeout);
    window._stratSaveTimeout = setTimeout(() => saveStrategy(), 500);
  }
}

async function suggestAngles() {
  const brand = state.currentBrand;
  if (!brand) return alert('Configurez d\'abord votre marque.');

  const btn = document.getElementById('suggest-angles-btn');
  const container = document.getElementById('angle-cards-container');
  if (!btn || !container) return;

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div> Analyse en cours...';
  container.innerHTML = '';

  try {
    const suggestions = await api(`/api/brands/${brand.id}/generate-strategy`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });

    const angles = suggestions.suggested_angles || suggestions.angles || suggestions || [];
    if (angles.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted);font-size:13px;margin-top:12px;">Aucune suggestion. Remplissez la strategie dans "Ma marque".</p>';
    } else {
      const funnelLabel = (raw) => {
        const map = {
          'PROBLEM_AWARE': 'Probleme',
          'SOLUTION_AWARE': 'Solution',
          'PRODUCT_AWARE': 'Produit',
          'MOST_AWARE': 'Convaincu',
          'UNAWARE': 'Inconscient',
          'TOFU': 'TOFU',
          'MOFU': 'MOFU',
          'BOFU': 'BOFU',
        };
        const key = (raw || '').toUpperCase().replace(/ /g, '_');
        return map[key] || raw || 'TOFU';
      };
      const funnelClass = (raw) => {
        const key = (raw || '').toLowerCase().replace(/ /g, '_');
        if (['problem_aware', 'tofu', 'unaware'].includes(key)) return 'tofu';
        if (['solution_aware', 'mofu'].includes(key)) return 'mofu';
        if (['product_aware', 'bofu', 'most_aware'].includes(key)) return 'bofu';
        return key;
      };
      container.innerHTML = `
        <div class="angle-cards">
          ${angles.map(a => {
            const rawFunnel = a.funnel_stage || a.funnel || 'tofu';
            return `
            <div class="angle-card" onclick="selectSuggestedAngle(this, '${(a.angle || a.text || '').replace(/'/g, "\\'")}')">
              <span class="angle-funnel ${funnelClass(rawFunnel)}">${funnelLabel(rawFunnel)}</span>
              <div class="angle-text">${a.angle || a.text || ''}</div>
              ${a.headline ? `<div class="angle-headline">"${a.headline}"</div>` : ''}
              ${a.rationale ? `<div class="angle-rationale" title="${(a.rationale || '').replace(/"/g, '&quot;')}">${a.rationale}</div>` : ''}
            </div>
          `}).join('')}
        </div>
      `;
    }
  } catch (e) {
    container.innerHTML = `<p style="color:#ef4444;font-size:13px;margin-top:12px;">Erreur: ${e.message}</p>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Suggerer des angles';
  }
}

function selectSuggestedAngle(card, angleText) {
  const input = document.getElementById('angle-input');
  if (input) input.value = angleText;
  // Visual feedback on card
  document.querySelectorAll('.angle-card').forEach(c => { c.classList.remove('selected'); c.style.borderColor = ''; });
  card.classList.add('selected');
  // Also set funnel pill if angle has funnel info
  const funnelBadge = card.querySelector('.angle-funnel');
  if (funnelBadge) {
    const funnel = funnelBadge.textContent.trim().toUpperCase();
    const pill = document.querySelector(`#funnel-pills .pill[data-value="${funnel}"]`);
    if (pill) selectPill(pill, 'funnel-pills');
  }
  // Scroll to angle input
  input?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function setImageStatus(imageId, statusTag) {
  try {
    const resp = await fetch(`/api/generated-images/${imageId}/tags`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({status_tag: statusTag})
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || 'Erreur API');
    }
  } catch (e) {
    console.warn('setImageStatus API erreur, MAJ locale uniquement:', e.message);
  }
  // Update flat list
  state.studioImages = (state.studioImages || []).map(img =>
    img.id === imageId ? { ...img, status_tag: statusTag } : img
  );
  // Update nested generations.images so re-render reflects new status
  state.generations = (state.generations || []).map(g => ({
    ...g,
    images: g.images.map(img =>
      img.id === imageId ? { ...img, status_tag: statusTag } : img
    )
  }));
  renderPage();
}

      headers: {'Content-Type': 'application/json'},

        brand_id: state.currentBrand?.id,
        image_id: state.insightImageId,
        source: 'mng',

        pattern_type: patternType,

    if (!resp.ok) {
